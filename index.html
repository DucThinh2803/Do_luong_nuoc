<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Theo Dõi Đo Lường Nước</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --primary: #38bdf8;
            --success: #34d399;
            --warning: #fbbf24;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 5px;
            font-size: 24px;
        }

        .status-container {
            text-align: center;
            margin-bottom: 25px;
            font-size: 14px;
            color: var(--text-sub);
        }

        #sync-status {
            font-weight: bold;
            color: var(--success);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 15px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            text-align: center;
            border: 1px solid #334155;
        }

        .card-full {
            grid-column: span 2;
        }

        .card-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-sub);
            margin-bottom: 10px;
        }

        .card-value {
            font-size: 32px;
            font-weight: bold;
            color: var(--primary);
        }

        .unit {
            font-size: 16px;
            font-weight: normal;
            color: var(--text-sub);
            margin-left: 5px;
        }

        #v4-value {
            font-size: 22px;
            color: var(--warning);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>HỆ THỐNG ĐO LƯỜNG NƯỚC</h1>
    <div class="status-container">
        Trạng thái web: <span id="sync-status">Đang kết nối...</span>
    </div>

    <div class="grid">
        <!-- Mực nước V2 -->
        <div class="card">
            <div class="card-title">Mực Nước</div>
            <div class="card-value"><span id="v2-value">--</span><span class="unit">%</span></div>
        </div>

        <!-- Chỉ số TDS V1 -->
        <div class="card">
            <div class="card-title">Chỉ số TDS</div>
            <div class="card-value"><span id="v1-value">--</span><span class="unit">ppm</span></div>
        </div>

        <!-- Nhiệt độ V3 -->
        <div class="card">
            <div class="card-title">Nhiệt Độ</div>
            <div class="card-value"><span id="v3-value">--</span><span class="unit">°C</span></div>
        </div>

        <!-- Hành động hệ thống V4 -->
        <div class="card card-full">
            <div class="card-title">Hành Động Hệ Thống</div>
            <div class="card-value" id="v4-value">--</div>
        </div>
    </div>
</div>

<script>
    // Điền mã Auth Token của bạn vào đây
    const BLYNK_AUTH_TOKEN = "hMSDzuKP60dJ3WlWkSf7aVmYZGynNLAZ";

    // Hàm gọi API để lấy dữ liệu từng chân Virtual Pin
    async function fetchBlynkData(pin) {
        const url = `https://blynk.cloud/external/api/get?token=${BLYNK_AUTH_TOKEN}&${pin}`;
        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error('Mất kết nối API');
            const data = await response.text();
            return data;
        } catch (error) {
            console.error(`Lỗi khi lấy dữ liệu chân ${pin}:`, error);
            return null;
        }
    }

    // Hàm cập nhật đồng bộ toàn bộ giao diện
    async function updateDashboard() {
        const statusEl = document.getElementById('sync-status');

        // Gọi đồng thời cả 4 API của 4 chân để tối ưu tốc độ tải
        const [v1, v2, v3, v4] = await Promise.all([
            fetchBlynkData('v1'),
            fetchBlynkData('v2'),
            fetchBlynkData('v3'),
            fetchBlynkData('v4')
        ]);

        // Cập nhật giá trị lên giao diện nếu lấy dữ liệu thành công
        if (v1 !== null) document.getElementById('v1-value').innerText = v1;
        if (v2 !== null) document.getElementById('v2-value').innerText = v2;
        if (v3 !== null) document.getElementById('v3-value').innerText = v3;
        if (v4 !== null) document.getElementById('v4-value').innerText = decodeURIComponent(v4).replace(/"/g, '');

        // Cập nhật trạng thái cập nhật cuối cùng
        if(v1 || v2 || v3 || v4) {
            const bâyGiờ = new Date().toLocaleTimeString('vi-VN');
            statusEl.innerText = `Đã cập nhật lúc ${bâyGiờ}`;
            statusEl.style.color = "#34d399";
        } else {
            statusEl.innerText = "Lỗi kết nối tới Blynk Cloud!";
            statusEl.style.color = "#f87171";
        }
    }

    // Chạy cập nhật ngay khi vừa mở trang web
    updateDashboard();

    // Tự động làm mới dữ liệu sau mỗi 2000ms (2 giây)
    setInterval(updateDashboard, 2000);
</script>

</body>
</html>
